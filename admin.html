<!DOCTYPE html>
<html>
<head>
<title>Admin Panel 🤠</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="font-family:sans-serif;padding:20px;">

<h2>🤠 Admin Panel</h2>

<input id="name" placeholder="Product Name (Tshirt / Shirt / Trackpant)"><br><br>

<input id="img" placeholder="Image URL"><br><br>

<button onclick="addProduct()">Add Product 🔥</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDRMF6SkGsve8T5HoBoCDo8pzz8BU",
  authDomain: "cowboy-collections.firebaseapp.com",
  projectId: "cowboy-collections"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.addProduct = async function(){

let name=document.getElementById("name").value.toLowerCase();
let img=document.getElementById("img").value;

if(!name || !img){
alert("Fill all fields ❌");
return;
}

let category="";
let price=0;

/* AUTO CATEGORY + PRICE */
if(name.includes("tshirt") || name.includes("t-shirt")){
category="T-Shirt";
price=699;
}
else if(name.includes("shirt")){
category="Shirt";
price=899;
}
else if(name.includes("track") || name.includes("pant")){
category="Track Pant";
price=799;
}
else{
category="Others";
price=499;
}

await addDoc(collection(db,"products"),{
name:name,
category:category,
price:price,
img:img
});

alert("Product Added 🔥");
}
</script>

</body>
</html>
