<!DOCTYPE html>
<html>
<head>
<title>Admin Panel 🤠</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="font-family:sans-serif;padding:20px;">

<h2>🤠 Admin Panel</h2>

<input id="name" placeholder="Product Name"><br><br>
<input id="price" placeholder="Price"><br><br>
<input id="img" placeholder="Image URL"><br><br>

<button onclick="addProduct()">Add Product 🔥</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDRMF6SkGsve8T5HoBoCDo8pzz8BU",
  authDomain: "cowboy-collections.firebaseapp.com",
  projectId: "cowboy-collections"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.addProduct = async function(){
let name=document.getElementById("name").value;
let price=document.getElementById("price").value;
let img=document.getElementById("img").value;

await addDoc(collection(db,"products"),{
name,price,img
});

alert("Product Added 🔥");
}
</script>

</body>
</html>
