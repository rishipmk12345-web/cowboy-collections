<!DOCTYPE html>
<html>
<head>
<title>Admin Bulk Panel 🤠</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="font-family:sans-serif;padding:20px;">

<h2>🤠 Bulk Product Upload</h2>

<p>Format: name,price,image</p>

<textarea id="bulk" rows="10" style="width:100%;"></textarea>

<br><br>

<button onclick="bulkAdd()">Upload All 🔥</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDRMF6SkGsve8T5HoBoCDo8pzz8BU",
  authDomain: "cowboy-collections.firebaseapp.com",
  projectId: "cowboy-collections"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.bulkAdd = async function(){
let data = document.getElementById("bulk").value.trim();

if(!data){
alert("Paste products ❌");
return;
}

let lines = data.split("\n");

for(let line of lines){
let parts = line.split(",");

let name = parts[0];
let price = Number(parts[1]);
let img = parts[2];

await addDoc(collection(db,"products"),{
name:name,
price:price,
img:img
});
}

alert("All Products Uploaded 🔥");
}
</script>

</body>
</html>
