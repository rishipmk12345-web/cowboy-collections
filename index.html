<!DOCTYPE html>
<html>
<head>
<title>🤠 Cowboy Collections</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial;
background:#F5E9DA;
color:#3E2723;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
padding:15px;
background:#3E2723;
color:white;
font-weight:bold;
}

/* HERO */
.hero img{
width:100%;
height:250px;
object-fit:cover;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}
.card{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
.card img{
width:100%;
border-radius:10px;
}
.card h3{
margin:5px 0;
font-size:16px;
}

/* BUTTON */
.btn{
width:100%;
padding:8px;
background:#3E2723;
color:white;
border:none;
margin-top:5px;
border-radius:5px;
}

/* CART */
.cart{
padding:10px;
background:#fff3e0;
margin:10px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="header">
<div>🤠 Cowboy Collections</div>
<div>🛒 Cart</div>
</div>

<div class="hero">
<img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b">
</div>

<h2 style="padding:10px;">🔥 Products</h2>

<div class="products" id="products"></div>

<div class="cart">
<h3>🛒 Your Cart</h3>
<div id="cartItems"></div>
<h3>Total ₹<span id="total">0</span></h3>

<button class="btn" onclick="pay()">Pay via UPI 💳</button>
</div>

<script>

/* SAMPLE PRODUCTS (admin la change pannalaam later) */
let products = JSON.parse(localStorage.getItem("products")) || [
{
name:"Acid Wash T-Shirt 🤠",
price:699,
img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"
},
{
name:"Drop Shoulder Tee 🔥",
price:799,
img:"https://images.unsplash.com/photo-1512436991641-6745cdb1723f"
}
];

let cart=[];

/* DISPLAY PRODUCTS */
function display(){
let html="";
products.forEach((p,i)=>{
html+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>₹${p.price}</p>
<button class="btn" onclick="add(${i})">Add to Cart</button>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

/* ADD TO CART */
function add(i){
cart.push(products[i]);
showCart();
}

/* SHOW CART */
function showCart(){
let html="";
let total=0;

cart.forEach(item=>{
html+=`<p>${item.name} - ₹${item.price}</p>`;
total+=item.price;
});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText=total;
}

/* PAYMENT (UPI) */
function pay(){
if(cart.length==0){
alert("Cart empty");
return;
}

let total=0;
cart.forEach(i=>total+=i.price);

/* YOUR UPI */
let upi="upi://pay?pa=sachinsharma69545@okicici&pn=CowboyCollections&am="+total+"&tn=Order Payment&cu=INR";

window.open(upi);
}

display();

</script>

</body>
</html>
