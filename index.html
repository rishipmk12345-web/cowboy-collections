<!DOCTYPE html>
<html>
<head>
  <title>Cowboy Collections Mens Wear</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 🔥 STYLE -->
  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#111;
      color:#fff;
    }

    header {
      background:gold;
      color:#000;
      padding:15px;
      font-size:22px;
      font-weight:bold;
    }

    .container {
      padding:15px;
      display:grid;
      grid-template-columns: repeat(2,1fr);
      gap:15px;
    }

    .card {
      background:#1c1c1c;
      padding:10px;
      border-radius:10px;
    }

    .card img {
      width:100%;
      border-radius:10px;
    }

    button {
      width:100%;
      padding:8px;
      margin-top:5px;
      border:none;
      border-radius:5px;
      font-weight:bold;
    }

    .cart {background:black;color:white;}
    .wa {background:green;color:white;}
    .upi {background:#0055ff;color:white;}

    /* LOGIN */
    #loginBox {
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:#000;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .loginCard {
      background:white;
      color:black;
      padding:20px;
      border-radius:10px;
      width:90%;
    }

    input {
      width:100%;
      padding:10px;
      margin:5px 0;
    }
  </style>
</head>

<body>

<header>🤠 Cowboy Collections Mens Wear</header>

<!-- LOGIN -->
<div id="loginBox">
  <div class="loginCard">
    <h2>Login 🔐</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="signup()">Signup</button>
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- PRODUCTS -->
<div class="container" id="products"></div>

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD5x5Nb5r5i-t7s4QI54ko8zk5b4g_Qsp8",
  authDomain: "cowboy-collections.firebaseapp.com",
  projectId: "cowboy-collections",
  storageBucket: "cowboy-collections.appspot.com",
  messagingSenderId: "669293200742",
  appId: "1:669293200742:web:137e00ca5386a8111eb4a7"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;

/* AUTH STATE */
auth.onAuthStateChanged(user=>{
  if(user){
    currentUser = user;
    document.getElementById("loginBox").style.display="none";
    loadProducts();
  } else {
    document.getElementById("loginBox").style.display="flex";
  }
});

/* SIGNUP */
function signup(){
  const email = emailInput();
  const pass = passInput();
  auth.createUserWithEmailAndPassword(email,pass)
  .then(()=>alert("Signup success 🔥"))
  .catch(e=>alert(e.message));
}

/* LOGIN */
function login(){
  const email = emailInput();
  const pass = passInput();
  auth.signInWithEmailAndPassword(email,pass)
  .catch(e=>alert(e.message));
}

function emailInput(){return document.getElementById("email").value;}
function passInput(){return document.getElementById("password").value;}

/* PRODUCTS */
const products = [
  {name:"Tshirt 🤠",price:699,img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"},
  {name:"Shirt 🤠",price:899,img:"https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf"},
  {name:"Trackpant 🤠",price:799,img:"https://images.unsplash.com/photo-1593032465171-8c6f3c9a6c0b"},
  {name:"Hoodie 🤠",price:999,img:"https://images.unsplash.com/photo-1602810316478-ccfdf8c1b5a0"}
];

function loadProducts(){
  const div = document.getElementById("products");
  div.innerHTML="";
  products.forEach(p=>{
    div.innerHTML += `
      <div class="card">
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p>₹${p.price}</p>
        <button class="cart" onclick="order('${p.name}',${p.price})">Cart</button>
        <button class="wa" onclick="whatsapp('${p.name}')">WhatsApp</button>
        <button class="upi" onclick="upiPay(${p.price})">UPI</button>
      </div>
    `;
  });
}

/* ORDER SAVE */
function order(name,price){
  db.collection("orders").add({
    userId: currentUser.uid,
    product:name,
    price:price,
    date:new Date()
  });
  alert("Added to order 🔥");
}

/* WHATSAPP */
function whatsapp(name){
  window.open(`https://wa.me/919994931763?text=I want ${name}`);
}

/* UPI */
function upiPay(price){
  window.open(`upi://pay?pa=yourupi@okaxis&pn=Cowboy&am=${price}`);
}
</script>

</body>
</html>
