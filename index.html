<!DOCTYPE html><html>
<head>
  <title>Cow Boy Collections</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #0a0a0a;
      color: white;
    }header {
  padding: 20px;
  text-align: center;
  font-size: 26px;
  font-weight: 700;
  letter-spacing: 1px;
  border-bottom: 1px solid #222;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 15px;
  padding: 15px;
}

.card {
  background: linear-gradient(145deg, #111, #1a1a1a);
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 5px 15px rgba(0,0,0,0.5);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.card-content {
  padding: 10px;
  text-align: center;
}

.price {
  color: #00ffcc;
  font-weight: 600;
}

button {
  background: #00ffcc;
  color: black;
  padding: 8px;
  border: none;
  border-radius: 20px;
  margin-top: 8px;
  width: 100%;
  font-weight: 600;
}

.cart {
  padding: 15px;
  border-top: 1px solid #222;
  background: #111;
}

.checkout-btn {
  background: #25D366;
  color: white;
  font-weight: bold;
}

  </style>
</head><body><header>Cow Boy Collections</header><div class="products" id="products"></div><div class="cart">
  <h3>🛒 Cart</h3>
  <div id="cartItems"></div>
  <h4>Total: ₹<span id="total">0</span></h4>
  <button class="checkout-btn" onclick="checkout()">Order via WhatsApp</button>
</div><script>
  const products = [
    {
      name: "Linen Pant",
      price: 999,
      img: "https://images.unsplash.com/photo-1593032465171-8c16c7d2c2a3"
    },
    {
      name: "Acid Wash T-Shirt",
      price: 799,
      img: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"
    },
    {
      name: "Drop Shoulder Tee",
      price: 899,
      img: "https://images.unsplash.com/photo-1523381210434-271e8be1f52b"
    },
    {
      name: "Hoodie",
      price: 1299,
      img: "https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf"
    }
  ];

  let cart = [];

  function displayProducts() {
    let html = "";
    products.forEach((p, i) => {
      html += `
        <div class="card">
          <img src="${p.img}" />
          <div class="card-content">
            <p>${p.name}</p>
            <p class="price">₹${p.price}</p>
            <button onclick="addToCart(${i})">Add to Cart</button>
          </div>
        </div>
      `;
    });
    document.getElementById("products").innerHTML = html;
  }

  function addToCart(i) {
    cart.push(products[i]);
    displayCart();
  }

  function displayCart() {
    let html = "";
    let total = 0;

    cart.forEach(item => {
      html += `<p>${item.name} - ₹${item.price}</p>`;
      total += item.price;
    });

    document.getElementById("cartItems").innerHTML = html;
    document.getElementById("total").innerText = total;
  }

  function checkout() {
    if(cart.length === 0){
      alert("Cart is empty");
      return;
    }

    let message = "Hi, I want to order:%0A";
    cart.forEach(item => {
      message += `${item.name} - ₹${item.price}%0A`;
    });

    message += `Total: ₹${cart.reduce((t,i)=>t+i.price,0)}`;

    window.open(`https://wa.me/919994931763?text=${message}`);
  }

  displayProducts();
</script></body>
</html>
