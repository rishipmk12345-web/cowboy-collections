<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cowboy Collections 🤠</title><style>
body{margin:0;font-family:sans-serif;background:#f5f5f5}
header{background:#ffcc00;padding:10px;display:flex;gap:10px}
.logo{font-weight:bold}
.products{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}
.card{background:white;padding:10px;border-radius:10px}
.btn{padding:8px;margin-top:5px;color:white;border-radius:5px;text-align:center}
.cart{background:black}
.wa{background:#25D366}
.upi{background:#0070ba}

/* LOGIN LOCK */
.lock{
position:fixed;top:0;left:0;width:100%;height:100%;
background:black;color:white;display:flex;flex-direction:column;
justify-content:center;align-items:center;z-index:999;
}
.lock input{padding:10px;margin:10px;border-radius:5px;border:none}
.lock button{padding:10px 20px;border:none;background:#ffcc00}
</style></head><body><!-- LOGIN LOCK --><div class="lock" id="lock">
<h2>🔐 Cowboy Login</h2>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Enter Store 🤠</button>
</div><header>
<div class="logo">🤠 Cowboy Collections</div>
</header><div class="products" id="products"></div><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDRMF6SkGsve8T5HoBoCDo8pzz8BUi7zoQ",
  authDomain: "cowboy-collections.firebaseapp.com",
  projectId: "cowboy-collections",
  storageBucket: "cowboy-collections.firebasestorage.app",
  messagingSenderId: "669293200742",
  appId: "1:669293200742:web:137e00ca5386a8111eb4a7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let allProducts=[];

async function loadProducts(){
let snap=await getDocs(collection(db,"products"));
allProducts=[];
snap.forEach(doc=>allProducts.push(doc.data()));
show();
}

function show(){
let html="";
allProducts.forEach(p=>{
html+=`<div class="card">
<img src="${p.img}" width="100%">
<h4>${p.name}</h4>
<p>₹${p.price}</p>
<div class="btn cart">Cart</div>
<div class="btn wa" onclick="order('${p.name}','${p.price}')">WhatsApp</div>
<div class="btn upi" onclick="pay('${p.price}')">UPI</div>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

window.order=(n,p)=>window.open(`https://wa.me/919994931763?text=Buy ${n} ₹${p}`);
window.pay=p=>window.location.href=`upi://pay?pa=sachinsharma69545@okicici&pn=Cowboy&am=${p}&cu=INR`;

window.login=()=>{
let email=document.getElementById("email").value;
let pass=document.getElementById("pass").value;

signInWithEmailAndPassword(auth,email,pass)
.then(()=>{
document.getElementById("lock").style.display="none";
loadProducts();
})
.catch(err=>alert(err.message));
}

// Auto login check
onAuthStateChanged(auth,user=>{
if(user){
document.getElementById("lock").style.display="none";
loadProducts();
}
});

</script></body>
</html>
