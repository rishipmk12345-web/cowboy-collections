<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cowboy Collections Mens Wear 🤠</title><style>
body{margin:0;font-family:sans-serif;background:#f5f5f5}
header{background:#ffcc00;padding:10px;display:flex;align-items:center;gap:10px}
.logo{font-weight:bold;font-size:18px}
.search{flex:1;padding:10px;border-radius:25px;border:none}
.categories{display:flex;overflow:auto;gap:10px;padding:10px;background:white}
.cat{padding:8px 12px;background:#eee;border-radius:20px}
.banner{padding:10px}
.banner img{width:100%;border-radius:10px}
.products{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}
.card{background:white;padding:10px;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,0.2)}
.card img{width:100%;border-radius:8px}
.price{font-weight:bold}
.old{text-decoration:line-through;color:gray;font-size:12px}
.btn{padding:8px;margin-top:5px;border-radius:6px;text-align:center;color:white}
.cartbtn{background:black}
.wabtn{background:#25D366}
.upi{background:#0070ba}
.cartpanel{position:fixed;bottom:0;left:0;width:100%;background:white;padding:15px;display:none;max-height:60%;overflow:auto}
.bottomnav{position:fixed;bottom:0;width:100%;background:white;display:flex;justify-content:space-around;padding:10px}
.loginBox{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;padding:20px;border-radius:10px;display:none}
</style></head><body><header>
<div class="logo">🤠 Cowboy</div>
<input class="search" placeholder="Search..." oninput="search(this.value)">
<div onclick="openLogin()">👤</div>
<div onclick="toggleCart()">🛒</div>
</header><div class="categories">
<div class="cat" onclick="filter('all')">All</div>
<div class="cat" onclick="filter('tshirt')">Tshirts</div>
<div class="cat" onclick="filter('shirt')">Shirts</div>
<div class="cat" onclick="filter('pant')">Pants</div>
</div><div class="banner">
<img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c">
</div><div class="products" id="products"></div>
<div class="cartpanel" id="cartpanel"></div><!-- LOGIN --><div class="loginBox" id="loginBox">
<h3>Login 🔐</h3>
<input id="email" placeholder="Email"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>
<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
<button onclick="google()">Google</button>
<button onclick="closeLogin()">Close</button>
</div><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig={
apiKey:"AIzaSyDRMF6SkGsve8T5HoBoCDo8pzz8BUi7",
projectId:"cowboy-collections"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);
const provider=new GoogleAuthProvider();

let allProducts=[];
let cart=JSON.parse(localStorage.getItem("cart"))||[];

async function loadProducts(){
let snap=await getDocs(collection(db,"products"));
allProducts=[];
snap.forEach(doc=>allProducts.push(doc.data()));
show(allProducts);
}

function show(data){
let html="";
data.forEach(p=>{
html+=`<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>
<p><span class="old">₹${Number(p.price)+300}</span> <span class="price">₹${p.price}</span></p>
<div class="btn cartbtn" onclick="addCart('${p.name}','${p.price}')">Cart</div>
<div class="btn wabtn" onclick="orderWA('${p.name}','${p.price}')">WhatsApp</div>
<div class="btn upi" onclick="payUPI('${p.price}')">UPI</div>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

window.search=q=>show(allProducts.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())));
window.filter=type=> type==='all'?show(allProducts):show(allProducts.filter(p=>p.name.toLowerCase().includes(type)));

window.addCart=(name,price)=>{cart.push({name,price});localStorage.setItem("cart",JSON.stringify(cart));alert("Added 🔥")}

window.toggleCart=()=>{
let panel=document.getElementById("cartpanel");
panel.style.display=panel.style.display==='block'?'none':'block';
let html="<h3>Cart</h3>";let total=0;
cart.forEach((p,i)=>{html+=`${p.name}-₹${p.price} <button onclick="removeItem(${i})">❌</button><br>`;total+=Number(p.price)});
html+=`<h4>Total ₹${total}</h4><button onclick="checkout()">Order</button>`;
panel.innerHTML=html;
}

window.removeItem=i=>{cart.splice(i,1);localStorage.setItem("cart",JSON.stringify(cart));toggleCart();}

window.checkout=()=>{
let msg="Order:%0A";let total=0;
cart.forEach(p=>{msg+=`${p.name}-₹${p.price}%0A`;total+=Number(p.price)});
msg+=`Total ₹${total}`;
window.open(`https://wa.me/919994931763?text=${msg}`);
}

window.orderWA=(name,price)=>window.open(`https://wa.me/919994931763?text=Buy ${name} ₹${price}`);
window.payUPI=price=>window.location.href=`upi://pay?pa=sachinsharma69545@okicici&pn=Cowboy&am=${price}&cu=INR`;

// LOGIN
window.openLogin=()=>document.getElementById("loginBox").style.display="block";
window.closeLogin=()=>document.getElementById("loginBox").style.display="none";

window.signup=()=>{
let email=document.getElementById("email").value;
let pass=document.getElementById("pass").value;
createUserWithEmailAndPassword(auth,email,pass)
.then(()=>alert("Signup success 🔥"))
.catch(err=>alert(err.message));
}

window.login=()=>{
let email=document.getElementById("email").value;
let pass=document.getElementById("pass").value;
signInWithEmailAndPassword(auth,email,pass)
.then(()=>alert("Login success 🔥"))
.catch(err=>alert(err.message));
}

window.google=()=>{
signInWithPopup(auth,provider)
.then(()=>alert("Google login success 🔥"))
.catch(err=>alert(err.message));
}

loadProducts();
</script></body>
</html>
