<!DOCTYPE html>
<html>
<head>
  <title>🤠 Cowboy Collections Mens Wear</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 🔥 GOOGLE FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin:0;
      font-family:'Poppins',sans-serif;
      background:#0f0f0f;
      color:#fff;
    }

    header {
      background:linear-gradient(90deg,#ffcc00,#ffaa00);
      padding:15px;
      display:flex;
      align-items:center;
      justify-content:space-between;
    }

    .title {
      font-size:20px;
      font-weight:600;
    }

    .search {
      padding:8px;
      border-radius:8px;
      border:none;
      width:40%;
    }

    .container {
      padding:15px;
      display:grid;
      grid-template-columns: repeat(2,1fr);
      gap:15px;
    }

    .card {
      background:#1c1c1c;
      border-radius:15px;
      overflow:hidden;
      box-shadow:0 0 15px rgba(255,200,0,0.2);
      transition:0.3s;
    }

    .card:hover {
      transform:scale(1.03);
    }

    .card img {
      width:100%;
      height:180px;
      object-fit:cover;
    }

    .info {
      padding:10px;
    }

    .price {
      color:#ffcc00;
      font-weight:bold;
    }

    button {
      width:100%;
      padding:8px;
      margin-top:5px;
      border:none;
      border-radius:8px;
      font-weight:bold;
    }

    .cart {background:#000;color:#fff;}
    .wa {background:#25D366;color:white;}
    .upi {background:#2962ff;color:white;}

    /* LOGIN */
    #loginBox {
      position:fixed;
      width:100%;
      height:100%;
      background:black;
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:10;
    }

    .loginCard {
      background:white;
      color:black;
      padding:20px;
      border-radius:10px;
      width:90%;
    }

    input {
      width:100%;
      padding:10px;
      margin:5px 0;
    }
  </style>
</head>

<body>

<header>
  <div class="title">🤠 Cowboy Collections</div>
  <input class="search" placeholder="Search...">
</header>

<div id="loginBox">
  <div class="loginCard">
    <h2>Login 🔐</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="signup()">Signup</button>
    <button onclick="login()">Login</button>
  </div>
</div>

<div class="container" id="products"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD5x5Nb5r5i-t7s4QI54ko8zk5b4g_Qsp8",
  authDomain: "cowboy-collections.firebaseapp.com",
  projectId: "cowboy-collections",
  storageBucket: "cowboy-collections.appspot.com",
  messagingSenderId: "669293200742",
  appId: "1:669293200742:web:137e00ca5386a8111eb4a7"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser=null;

auth.onAuthStateChanged(user=>{
  if(user){
    currentUser=user;
    document.getElementById("loginBox").style.display="none";
    loadProducts();
  } else {
    document.getElementById("loginBox").style.display="flex";
  }
});

function signup(){
  auth.createUserWithEmailAndPassword(email.value,password.value)
  .then(()=>alert("Signup success 🔥"))
  .catch(e=>alert(e.message));
}

function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .catch(e=>alert(e.message));
}

const products=[
  {name:"Tshirt 🤠",price:699,img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"},
  {name:"Shirt 🤠",price:899,img:"https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf"},
  {name:"Trackpant 🤠",price:799,img:"https://images.unsplash.com/photo-1593032465171-8c6f3c9a6c0b"},
  {name:"Hoodie 🤠",price:999,img:"https://images.unsplash.com/photo-1602810316478-ccfdf8c1b5a0"}
];

function loadProducts(){
  let html="";
  products.forEach(p=>{
    html+=`
    <div class="card">
      <img src="${p.img}">
      <div class="info">
        <h3>${p.name}</h3>
        <p class="price">₹${p.price}</p>
        <button class="cart" onclick="order('${p.name}',${p.price})">Cart</button>
        <button class="wa" onclick="wa('${p.name}')">WhatsApp</button>
        <button class="upi" onclick="upi(${p.price})">UPI</button>
      </div>
    </div>`;
  });

  document.getElementById("products").innerHTML = html;
}

function order(name,price){
  db.collection("orders").add({
    userId:currentUser.uid,
    product:name,
    price:price,
    date:new Date()
  });
  alert("Order added 🔥");
}

function wa(name){
  window.open(`https://wa.me/919994931763?text=I want ${name}`);
}

function upi(price){
  window.open(`upi://pay?pa=yourupi@okaxis&pn=Cowboy&am=${price}`);
}
</script>

</body>
</html>
