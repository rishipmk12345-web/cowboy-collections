<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cowboy Collections 🤠</title><style>
body{margin:0;font-family:sans-serif;background:#f5f5f5}
header{background:#ffcc00;padding:10px;display:flex;justify-content:space-between}
.logo{font-weight:bold}
.products{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}
.card{background:white;padding:10px;border-radius:10px}
.btn{padding:8px;margin-top:5px;color:white;border-radius:5px;text-align:center}
.cart{background:black}
.wa{background:#25D366}
.upi{background:#0070ba}

.lock{position:fixed;top:0;left:0;width:100%;height:100%;background:black;color:white;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:999}
.lock input{padding:10px;margin:10px;border-radius:5px;border:none}
.lock button{padding:10px 20px;border:none;background:#ffcc00}

.orders{padding:10px}
</style></head><body><!-- LOGIN LOCK --><div class="lock" id="lock">
<h2>🔐 Login</h2>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
</div><header>
<div class="logo">🤠 Cowboy</div>
<div onclick="loadMyOrders()">📦 My Orders</div>
<div onclick="logout()">🚪 Logout</div>
</header><div class="products" id="products"></div>
<div class="orders" id="orders"></div><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDRMF6SkGsve8T5HoBoCDo8pzz8BUi7zoQ",
  authDomain: "cowboy-collections.firebaseapp.com",
  projectId: "cowboy-collections",
  storageBucket: "cowboy-collections.firebasestorage.app",
  messagingSenderId: "669293200742",
  appId: "1:669293200742:web:137e00ca5386a8111eb4a7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let allProducts=[];
let cart=[];

// LOGIN
window.signup=()=>{
let email=document.getElementById("email").value;
let pass=document.getElementById("pass").value;
createUserWithEmailAndPassword(auth,email,pass)
.then(()=>alert("Signup success"))
.catch(e=>alert(e.message));
}

window.login=()=>{
let email=document.getElementById("email").value;
let pass=document.getElementById("pass").value;
signInWithEmailAndPassword(auth,email,pass)
.then(()=>{
document.getElementById("lock").style.display="none";
loadProducts();
})
.catch(e=>alert(e.message));
}

window.logout=()=>{
signOut(auth);
location.reload();
}

onAuthStateChanged(auth,user=>{
if(user){
document.getElementById("lock").style.display="none";
loadProducts();
}
});

// PRODUCTS
async function loadProducts(){
let snap=await getDocs(collection(db,"products"));
allProducts=[];
snap.forEach(doc=>allProducts.push(doc.data()));
show();
}

function show(){
let html="";
allProducts.forEach(p=>{
html+=`<div class="card">
<img src="${p.img}" width="100%">
<h4>${p.name}</h4>
<p>₹${p.price}</p>
<div class="btn cart" onclick="addCart('${p.name}','${p.price}')">Add Cart</div>
<div class="btn wa" onclick="order('${p.name}','${p.price}')">WhatsApp</div>
<div class="btn upi" onclick="pay('${p.price}')">UPI</div>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

window.addCart=(n,p)=>{cart.push({name:n,price:p});alert("Added")}

// ORDER SAVE (PRIVATE)
window.order=async(n,p)=>{
let user=auth.currentUser;

await addDoc(collection(db,"orders"),{
userId:user.uid,
name:n,
price:p,
date:new Date().toISOString()
});

window.open(`https://wa.me/919994931763?text=Buy ${n} ₹${p}`);
}

window.pay=p=>window.location.href=`upi://pay?pa=sachinsharma69545@okicici&pn=Cowboy&am=${p}&cu=INR`;

// PRIVATE ORDERS
window.loadMyOrders=async()=>{
let user=auth.currentUser;

let q=query(collection(db,"orders"),where("userId","==",user.uid));
let snap=await getDocs(q);

let html="<h3>My Orders</h3>";

snap.forEach(doc=>{
let o=doc.data();
html+=`<div style='border:1px solid #ccc;padding:10px;margin:10px 0'>
${o.name} - ₹${o.price}<br>
<small>${o.date}</small>
</div>`;
});

document.getElementById("orders").innerHTML=html;
}

</script></body>
</html>
