<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cowboy Collections Mens Wear 🤠</title><style>
body{margin:0;font-family:sans-serif;background:#f5f5f5}
header{background:#ffcc00;padding:10px;display:flex;align-items:center;gap:10px}
.logo{font-weight:bold}
.search{flex:1;padding:10px;border-radius:20px;border:none}
.products{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}
.card{background:white;padding:10px;border-radius:10px}
.card img{width:100%;border-radius:10px}
.btn{padding:8px;margin-top:5px;border-radius:6px;color:white;text-align:center}
.cartbtn{background:black}
.wabtn{background:#25D366}
.upi{background:#0070ba}
.loginbox{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center}
.logininner{background:white;padding:20px;border-radius:10px;width:80%}
</style></head><body><header>
<div class="logo">🤠 Cowboy</div>
<input class="search" placeholder="Search..." oninput="search(this.value)">
<div onclick="openLogin()">👤</div>
<div onclick="toggleCart()">🛒</div>
</header><div class="products" id="products"></div><div id="cartpanel" style="display:none;background:white;position:fixed;bottom:0;width:100%;padding:10px"></div><!-- LOGIN --><div class="loginbox" id="loginbox">
<div class="logininner">
<h3>Login 🔐</h3>
<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>
<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
<button onclick="googleLogin()">Google</button>
<button onclick="closeLogin()">Close</button>
</div>
</div><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig={
apiKey:"AIzaSyDRMF6SkGsve8T5HoBoCDo8pzz8BUi7",
projectId:"cowboy-collections"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);

let allProducts=[];
let cart=[];
let userId=null;

onAuthStateChanged(auth,(user)=>{
if(user){
userId=user.uid;
cart=JSON.parse(localStorage.getItem(userId))||[];
alert("Welcome 🔥");
}else{
userId=null;
}
});

async function loadProducts(){
let snap=await getDocs(collection(db,"products"));
allProducts=[];
snap.forEach(doc=>allProducts.push(doc.data()));
show(allProducts);
}

function show(data){
let html="";
data.forEach(p=>{
html+=`<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>
<p>₹${p.price}</p>
<div class="btn cartbtn" onclick="addCart('${p.name}','${p.price}')">Cart</div>
<div class="btn wabtn" onclick="orderWA('${p.name}','${p.price}')">WhatsApp</div>
<div class="btn upi" onclick="payUPI('${p.price}')">UPI</div>
</div>`;
});

document.getElementById("products").innerHTML=html;
}

window.search=function(q){
let res=allProducts.filter(p=>p.name.toLowerCase().includes(q.toLowerCase()));
show(res);
}

window.addCart=function(name,price){
if(!userId){alert("Login first");openLogin();return}
cart.push({name,price});
localStorage.setItem(userId,JSON.stringify(cart));
alert("Added 🔥");
}

window.toggleCart=function(){
let panel=document.getElementById("cartpanel");
panel.style.display=panel.style.display==='block'?'none':'block';
let html="Cart:<br>";
let total=0;
cart.forEach(p=>{html+=p.name+" ₹"+p.price+"<br>";total+=Number(p.price);});
html+="Total ₹"+total;
panel.innerHTML=html;
}

window.orderWA=function(name,price){
window.open(`https://wa.me/919994931763?text=Buy ${name} ₹${price}`);
}

window.payUPI=function(price){
window.location.href=`upi://pay?pa=sachinsharma69545@okicici&pn=Cowboy&am=${price}&cu=INR`;
}

// LOGIN FUNCTIONS
window.openLogin=()=>document.getElementById("loginbox").style.display="flex";
window.closeLogin=()=>document.getElementById("loginbox").style.display="none";

window.signup=()=>{
let email=document.getElementById("email").value;
let pass=document.getElementById("password").value;
createUserWithEmailAndPassword(auth,email,pass);
}

window.login=()=>{
let email=document.getElementById("email").value;
let pass=document.getElementById("password").value;
signInWithEmailAndPassword(auth,email,pass);
}

window.googleLogin=()=>{
let provider=new GoogleAuthProvider();
signInWithPopup(auth,provider);
}

loadProducts();
</script></body>
</html>
