<!DOCTYPE html>
<html>
<head>
  <title>🤠 Cowboy Collections Mens Wear</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:Arial; background:#f5f5f5; }

    .header {
      background:#ffcc00;
      padding:15px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-weight:bold;
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
      padding:10px;
    }

    .card {
      background:white;
      border-radius:12px;
      padding:10px;
      box-shadow:0 2px 6px rgba(0,0,0,0.1);
    }

    .card img {
      width:100%;
      border-radius:10px;
    }

    .btn {
      width:100%;
      padding:10px;
      margin-top:5px;
      border:none;
      border-radius:8px;
      font-weight:bold;
    }

    .cart { background:black; color:white; }
    .wa { background:green; color:white; }

    .loginBox {
      position:fixed;
      bottom:0;
      width:100%;
      background:white;
      padding:15px;
      border-radius:20px 20px 0 0;
    }

    input {
      width:100%;
      padding:10px;
      margin:5px 0;
    }
  </style>
</head>

<body>

<div class="header">
  🤠 Cowboy Collections
  <button onclick="logout()">Logout</button>
</div>

<div class="grid" id="products"></div>

<div class="loginBox" id="loginBox">
  <h3>Login 🔐</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="signup()">Signup</button>
  <button onclick="login()">Login</button>
</div>

<!-- ✅ FIREBASE (WORKING VERSION - NO MODULE ERROR) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDRMF6SkGsve8T5HoBoCDo8pzz8BUi7zoQ",
    authDomain: "cowboy-collections.firebaseapp.com",
    projectId: "cowboy-collections"
  };

  firebase.initializeApp(firebaseConfig);

  const auth = firebase.auth();
  const db = firebase.firestore();

  /* PRODUCTS */
  const products = [
    {name:"Tshirt 🤠", price:699, img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"},
    {name:"Shirt 🤠", price:899, img:"https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf"}
  ];

  const productDiv = document.getElementById("products");

  products.forEach(p=>{
    productDiv.innerHTML += `
      <div class="card">
        <img src="${p.img}">
        <h4>${p.name}</h4>
        <p>₹${p.price}</p>
        <button class="btn cart" onclick="order('${p.name}',${p.price})">Order</button>
        <button class="btn wa" onclick="whatsapp('${p.name}')">WhatsApp</button>
      </div>
    `;
  });

  /* AUTH */
  function signup(){
    auth.createUserWithEmailAndPassword(email.value,password.value)
    .then(()=>alert("Signup Success"))
    .catch(e=>alert(e.message));
  }

  function login(){
    auth.signInWithEmailAndPassword(email.value,password.value)
    .then(()=>alert("Login Success"))
    .catch(e=>alert(e.message));
  }

  function logout(){
    auth.signOut();
  }

  auth.onAuthStateChanged(user=>{
    if(user){
      loginBox.style.display="none";
    } else {
      loginBox.style.display="block";
    }
  });

  /* ORDER */
  function order(name,price){
    if(!auth.currentUser){
      alert("Login first");
      return;
    }

    db.collection("orders").add({
      product:name,
      price:price,
      userId:auth.currentUser.uid,
      date:new Date().toISOString()
    });

    alert("Order placed 🔥");
  }

  function whatsapp(name){
    window.open("https://wa.me/919994931763?text=I want "+name);
  }

</script>

</body>
</html>
