<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cowboy Collections 🤠</title><style>
body { margin:0; font-family: Arial; background: linear-gradient(to right,#f7e7c6,#e6d3a3); }

header { background:#c49b0b; padding:15px; text-align:center; font-size:24px; font-weight:bold; color:#000; box-shadow:0 4px 10px rgba(0,0,0,0.3); }

.banner {
  height:220px;
  background:url('https://images.unsplash.com/photo-1521335629791-ce4aec67dd53');
  background-size:cover;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:30px;
  font-weight:bold;
  text-shadow:2px 2px 10px black;
}

.buttons { text-align:center; margin:15px; }
button {
  padding:10px 15px;
  margin:5px;
  border:none;
  background:#000;
  color:#fff;
  border-radius:20px;
  box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

.products {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:12px;
}

.card {
  background:white;
  padding:10px;
  border-radius:15px;
  box-shadow:0 6px 15px rgba(0,0,0,0.2);
  transform:scale(1);
  transition:0.3s;
}
.card:hover { transform:scale(1.05); }

.card img { width:100%; border-radius:10px; }

.buy {
  background:#25D366;
  color:white;
  padding:8px;
  text-align:center;
  margin-top:6px;
  border-radius:8px;
  font-size:14px;
}

.upi {
  background:#0070ba;
}

.footer {
  text-align:center;
  padding:20px;
  background:#000;
  color:white;
}

</style></head><body><header>🤠 Cowboy Collections</header><div class="banner">Shop Like a Cowboy 🤠</div><div class="buttons">
<button onclick="filterProducts('all')">All</button>
<button onclick="filterProducts('Tshirt')">Tshirts</button>
<button onclick="filterProducts('Shirt')">Shirts</button>
<button onclick="filterProducts('Trackpant')">Bottom</button>
</div><div class="products" id="products"></div><div class="footer">
📍 Locations: Paramakudi | Mudukulathur <br><br>
📞 WhatsApp Orders: <br>
<a href="https://wa.me/919994931763" style="color:yellow">9994931763</a> | 
<a href="https://wa.me/918838542843" style="color:yellow">8838542843</a>
</div><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDRMF6SkGsve8T5HoBoCDo8pzz8BUi7",
  authDomain: "cowboy-collections.firebaseapp.com",
  projectId: "cowboy-collections",
  storageBucket: "cowboy-collections.appspot.com",
  messagingSenderId: "669293200742",
  appId: "1:669293200742:web:137e00ca5386a811eb4a7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allProducts = [];

async function loadProducts() {
  const querySnapshot = await getDocs(collection(db, "products"));
  allProducts = [];
  querySnapshot.forEach((doc) => {
    allProducts.push(doc.data());
  });
  displayProducts(allProducts);
}

function displayProducts(products) {
  const container = document.getElementById("products");
  container.innerHTML = "";

  products.forEach(p => {
    container.innerHTML += `
      <div class="card">
        <img src="${p.img}">
        <h4>${p.name}</h4>
        <p>₹${p.price}</p>
        <div class="buy" onclick="orderWhatsApp('${p.name}','${p.price}')">WhatsApp Order</div>
        <div class="buy upi" onclick="upiPay('${p.price}')">Pay via UPI</div>
      </div>
    `;
  });
}

window.filterProducts = function(type) {
  if(type === 'all') displayProducts(allProducts);
  else displayProducts(allProducts.filter(p => p.name.includes(type)));
}

window.orderWhatsApp = function(name, price) {
  let msg = `Hi, I want to order ${name} for ₹${price}`;
  window.open(`https://wa.me/919994931763?text=${encodeURIComponent(msg)}`);
}

window.upiPay = function(price) {
  window.location.href = `upi://pay?pa=sachinsharma69545@okicici&pn=SharmaSachin&am=${price}&cu=INR`;
}

loadProducts();

</script></body>
</html>
