<!DOCTYPE html>
<html>
<head>
<title>🤠 Cowboy Collections</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="font-family:sans-serif;background:#f5e6d3;">

<h2 style="text-align:center;">🤠 Cowboy Collections</h2>

<div id="products"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDRMF6SkGsve8T5HoBoCDo8pzz8BU",
  authDomain: "cowboy-collections.firebaseapp.com",
  projectId: "cowboy-collections",
  storageBucket: "cowboy-collections.appspot.com",
  messagingSenderId: "669293200742",
  appId: "1:669293200742:web:137e00ca5386a811"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadProducts(){
  const snapshot = await getDocs(collection(db,"products"));

  let html="";
  snapshot.forEach(doc=>{
    let p=doc.data();

    html+=`
    <div style="background:white;margin:10px;padding:10px;border-radius:10px;">
      <img src="${p.img}" width="100%">
      <h3>${p.name}</h3>
      <p>₹${p.price}</p>
    </div>`;
  });

  document.getElementById("products").innerHTML=html;
}

loadProducts();
</script>

</body>
</html>
