<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🤠 Cowboy Collections Mens Wear</title><style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:#eef1f5}
header{background:#ffcc00;padding:12px;display:flex;align-items:center;gap:10px;position:sticky;top:0}
.logo{font-weight:bold}
.search{flex:1;padding:10px;border-radius:25px;border:none}

.products{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:12px}
.card{background:white;padding:10px;border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,0.15)}
.card img{width:100%;border-radius:10px}
.btn{padding:8px;margin-top:6px;border-radius:8px;text-align:center;color:white}
.cartbtn{background:black}
.buybtn{background:#25D366}

.cartpanel{position:fixed;bottom:0;width:100%;background:white;padding:15px;display:none;max-height:60%;overflow:auto}

.checkoutbox{margin-top:10px}
.checkoutbox input{width:100%;padding:8px;margin:5px 0}

</style></head><body><header>
<div class="logo">🤠 Cowboy</div>
<input class="search" placeholder="Search..." oninput="search(this.value)">
<div onclick="toggleCart()">🛒</div>
</header><div class="products" id="products"></div><div class="cartpanel" id="cartpanel"></div><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyDRMF6SkGsve8T5HoBoCDo8pzz8BUi7",
projectId:"cowboy-collections"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let allProducts=[];
let cart=JSON.parse(localStorage.getItem("cart"))||[];

async function loadProducts(){
let snap=await getDocs(collection(db,"products"));
allProducts=[];
snap.forEach(doc=>allProducts.push(doc.data()));
show(allProducts);
}

function show(data){
let html="";
data.forEach(p=>{
html+=`<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>
<p>₹${p.price}</p>
<div class="btn cartbtn" onclick="addCart('${p.name}','${p.price}')">Add to Cart</div>
<div class="btn buybtn" onclick="buyNow('${p.name}','${p.price}')">Buy Now</div>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

window.search=function(q){
let res=allProducts.filter(p=>p.name.toLowerCase().includes(q.toLowerCase()));
show(res);
}

window.addCart=function(name,price){
cart.push({name,price});
localStorage.setItem("cart",JSON.stringify(cart));
alert("Added");
}

window.toggleCart=function(){
let panel=document.getElementById("cartpanel");
panel.style.display=panel.style.display==='block'?'none':'block';

let html="<h3>Cart</h3>";
let total=0;

cart.forEach(p=>{html+=`${p.name}-₹${p.price}<br>`;total+=Number(p.price);});

html+=`<h4>Total ₹${total}</h4>`;

html+=`
<div class='checkoutbox'>
<input id='name' placeholder='Your Name'>
<input id='phone' placeholder='Phone'>
<input id='address' placeholder='Address'>
<button onclick='placeOrder()'>Place Order</button>
</div>`;

panel.innerHTML=html;
}

window.placeOrder=async function(){
let name=document.getElementById('name').value;
let phone=document.getElementById('phone').value;
let address=document.getElementById('address').value;

if(!name||!phone||!address){alert("Fill details");return}

await addDoc(collection(db,"orders"),{
name,phone,address,cart,date:new Date().toISOString()
});

alert("Order placed 🔥");
cart=[];
localStorage.setItem("cart",JSON.stringify(cart));
location.reload();
}

window.buyNow=function(name,price){
window.open(`https://wa.me/919994931763?text=Buy ${name} ₹${price}`);
}

loadProducts();
</script></body>
</html>
