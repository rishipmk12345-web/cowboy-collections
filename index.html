<head>

<title>Cowboy Collections Mens Wear 🤠</title><style>
body {

  font-family:'Segoe UI',sans-serif;

}

header {
  background:#3b2f2f;
  color:#fff;
  padding:15px;
  text-align:center;

.banner {
  background:url('https://images.unsplash.com/photo-1503342217505-b0a15ec3261c');

.products {

  grid-template-columns:repeat(2,1fr);

.card {

  box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

.card img {
  width:100%;

}

.price {
  font-weight:bold;

}

.old {
  text-decoration:line-through;

}

.btn {
  padding:8px;
  margin-top:5px;

.cart { background:#000; }

.cartpanel {
  position:fixed;

}

  position:fixed;
  bottom:80px;
  right:15px;
  background:#25D366;

  background:#3b2f2f;

</style></head><body><header>🤠 Cowboy Collections Mens Wear</header><div class="banner">Ride Your Style 🤠</div><div class="products" id="products"></div><div class="cartpanel" id="cartpanel"></div><div class="float" onclick="openWhatsApp()">💬</div><div class="footer">
📍 Paramakudi | Mudukulathur <br>
📞 9994931763 | 8838542843
</div><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDRMF6SkGsve8T5HoBoCDo8pzz8BUi7",
  authDomain: "cowboy-collections.firebaseapp.com",
  projectId: "cowboy-collections",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let cart = JSON.parse(localStorage.getItem("cart")) || [];

async function loadProducts(){
  let snap = await getDocs(collection(db,"products"));
  let html="";
  snap.forEach(doc=>{
    let p=doc.data();
    html+=`
    <div class="card">
      <img src="${p.img}">
      <h4>${p.name}</h4>
      <p><span class="old">₹${Number(p.price)+300}</span> <span class="price">₹${p.price}</span></p>
      <div class="btn cart" onclick="addCart('${p.name}','${p.price}')">Add to Cart</div>
      <div class="btn whatsapp" onclick="orderWA('${p.name}','${p.price}')">WhatsApp</div>
      <div class="btn upi" onclick="payUPI('${p.price}')">UPI Pay</div>
    </div>`;
  });
  document.getElementById("products").innerHTML=html;
}

window.addCart=function(name,price){
  cart.push({name,price});
  localStorage.setItem("cart",JSON.stringify(cart));
  alert("Added 🔥");
}

window.openWhatsApp=function(){
  if(cart.length===0){ alert("Cart empty"); return; }
  let msg="Order:%0A";
  let total=0;
  cart.forEach(p=>{ msg+=`${p.name}-₹${p.price}%0A`; total+=Number(p.price); });
  msg+=`Total ₹${total}`;

  window.open(`https://wa.me/919994931763?text=${msg}`);
}

window.orderWA=function(name,price){
  let msg=`Buy ${name} ₹${price}`;
  window.open(`https://wa.me/919994931763?text=${msg}`);
}

window.payUPI=function(price){
  window.location.href=`upi://pay?pa=sachinsharma69545@okicici&pn=Cowboy&am=${price}&cu=INR`;
}

loadProducts();
</script></body>
</html>
